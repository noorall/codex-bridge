name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: build
        uses: ./.github/actions/build-plugin

      - uses: actions/upload-artifact@v4
        with:
          name: codex-bridge-plugin
          path: ${{ steps.build.outputs.plugin_zip }}
          retention-days: 7
          if-no-files-found: error
