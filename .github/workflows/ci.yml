name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: build
        uses: ./.github/actions/build-plugin

      - name: Build artifact name
        id: artifact-name
        run: echo "name=codex-cli-bridge-plugin-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Prepare installable plugin artifact
        run: |
          rm -rf build/ci-artifact
          mkdir -p build/ci-artifact
          unzip -q "${{ steps.build.outputs.plugin_zip }}" -d build/ci-artifact

      - name: Upload installable plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: build/ci-artifact
          retention-days: 7
          if-no-files-found: error

  windows-idea-smoke:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Build and test in IntelliJ IDEA on Windows
        shell: pwsh
        run: gradle --no-daemon clean check buildPlugin integrationTest -PintegrationIdeVersion=2025.2.6.2

      - name: Upload Windows IDEA diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-idea-smoke-${{ github.run_number }}-${{ github.sha }}
          path: |
            build/reports/tests/integrationTest
            build/test-results/integrationTest
            build/idea-sandbox/**/log
            build/**/idea.log
            build/**/errors
          retention-days: 7
          if-no-files-found: warn
