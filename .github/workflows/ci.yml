name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: build
        uses: ./.github/actions/build-plugin

      - name: Build artifact name
        id: artifact-name
        run: echo "name=codex-bridge-plugin-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Prepare installable plugin artifact
        run: |
          rm -rf build/ci-artifact
          mkdir -p build/ci-artifact
          unzip -q "${{ steps.build.outputs.plugin_zip }}" -d build/ci-artifact

      - name: Upload installable plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: build/ci-artifact
          retention-days: 7
          if-no-files-found: error
